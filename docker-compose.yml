services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: paretopick-r
    ports:
      - "3838:3838"
      - "4000:4000"
    volumes:
      # Persistent data — survives container restarts
      - ./data:/srv/shiny-server/data
      - ./input:/srv/shiny-server/input
      - ./output:/srv/shiny-server/output
      # Live-reload for development (comment out for production)
      - ./app:/srv/shiny-server/app
    environment:
      - CHROMOTE_CHROME=/usr/bin/chromium
      - R_WARN=-1
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 4g
        reservations:
          memory: 512m
    healthcheck:
      test: ["CMD", "curl", "-f", http://localhost:3838/app/]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
